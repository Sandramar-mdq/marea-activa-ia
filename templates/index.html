<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marea Activa - Asistente de Turismo</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-content">
        <span class="header-icon">&#x1F30A;</span>
        <div>
          <h1>Marea Activa</h1>
          <p class="subtitle">Asistente de Turismo</p>
        </div>
      </div>
    </header>

    <main id="chat-container">
      <div id="chat-history" role="log" aria-live="polite"></div>
      <div id="quick-actions"></div>
    </main>

    <footer id="input-area">
      <form class="input-wrapper" id="chat-form">
        <input
          type="text"
          id="message-input"
          placeholder="Preguntá por deportes, paseos o zonas..."
          autocomplete="off"
        />
        <button id="send-btn" aria-label="Enviar mensaje">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
